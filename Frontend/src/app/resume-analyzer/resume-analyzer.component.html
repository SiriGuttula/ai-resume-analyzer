<div class="container mt-5">

<h2 class="text-center mb-4">AI Resume Analyzer</h2>

<div class="card p-4 shadow">

<input type="file"
(change)="onFileSelected($event)"
class="form-control">

<textarea
[(ngModel)]="jobDescription"
class="form-control mt-3"
rows="4"
placeholder="Paste Job Description">
</textarea>

<button
class="btn btn-primary mt-3"
(click)="analyze()">
Analyze Resume
</button>

<div *ngIf="analysis.resumeScore" class="mt-4">

<h4>Resume Score</h4>
<div class="progress">
<div class="progress-bar bg-success"
[style.width.%]="analysis.resumeScore">
{{analysis.resumeScore}}%
</div>
</div>

<h4 class="mt-3">Match Score</h4>
<div class="progress">
<div class="progress-bar bg-info"
[style.width.%]="analysis.matchScore">
{{analysis.matchScore}}%
</div>
</div>

<h5 class="mt-4">Skills</h5>
<ul>
  <li *ngFor="let skill of analysis.skills">
    {{skill}}
  </li>
</ul>

<h5>Strengths</h5>
<p>{{analysis.strengths}}</p>

<h5>Missing Skills</h5>
<p class="text-danger">{{analysis.missingSkills}}</p>

<h5>Improvements</h5>
<p>{{analysis.improvements}}</p>

</div>

</div>
</div>
